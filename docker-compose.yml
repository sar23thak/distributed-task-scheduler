version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: taskscheduler-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: taskscheduler
      MYSQL_USER: appuser
      MYSQL_PASSWORD: app1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7.2
    container_name: taskscheduler-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  mysql_data: